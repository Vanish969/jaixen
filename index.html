<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@jaixen</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
cursor:none;
}

body{
height:100vh;
overflow:hidden;
background:black;
color:white;
font-family:sans-serif;
}

/* ENTER SCREEN */

.enter{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
font-family:'Bebas Neue', sans-serif;
font-size:30px;
letter-spacing:4px;
backdrop-filter:blur(30px);
background:rgba(0,0,0,0.35);
cursor:pointer;
z-index:100;
transition:1.2s ease;
}

.enter.fade{
opacity:0;
pointer-events:none;
}

/* BACKGROUND */

.bg{
position:absolute;
inset:0;
background-size:cover;
background-position:center;
filter:blur(18px) brightness(40%);
animation:zoom 25s infinite alternate ease-in-out;
}

@keyframes zoom{
from{transform:scale(1.05);}
to{transform:scale(1.2);}
}

/* CARD */

.card{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

/* PROFILE */

.profile{
width:135px;
height:135px;
border-radius:50%;
object-fit:cover;
border:2px solid #c0c0c0;
box-shadow:0 0 5px #bbb;
}

/* USERNAME */

.username{
font-family:'Playfair Display', serif;
font-weight:700;
font-size:34px;
letter-spacing:2px;
text-transform:lowercase;
text-shadow:0 0 10px #fff;
}

/* GIF ROW */

.gif-row{
margin-top:10px;
display:flex;
justify-content:center;
gap:10px;
}

.gif-row img{
width:45px;
height:45px;
border-radius:6px;
}

/* BIO */

.bio{
margin-top:12px;
font-family:'Playfair Display', serif;
font-size:16px;
white-space:nowrap;
overflow:hidden;
min-height:20px;
}

/* SOCIALS */

.socials{
margin-top:20px;
display:flex;
justify-content:center;
gap:18px;
}

.socials img{
width:26px;
}

/* VISITS */

.visits{
margin-top:20px;
font-size:11px;
opacity:0.4;
}

/* CURSOR */

.cursor{
position:fixed;
width:12px;
height:12px;
border-radius:50%;
background:white;
box-shadow:0 0 10px white;
pointer-events:none;
transform:translate(-50%, -50%);
z-index:9999;
}

.cursor-follower{
position:fixed;
width:8px;
height:8px;
border-radius:50%;
background:white;
box-shadow:0 0 6px white;
pointer-events:none;
transform:translate(-50%, -50%);
z-index:9998;
}

/* WARNING OVERLAY */

#skidWarning{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
z-index:99999;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(25px);
}

.skid-box{
text-align:center;
font-family:'Bebas Neue',sans-serif;
color:white;
}

.skid-box h1{
letter-spacing:6px;
font-size:32px;
margin-bottom:10px;
}

.skid-box p{
opacity:0.7;
margin-bottom:20px;
}

.skid-box button{
background:white;
color:black;
border:none;
padding:10px 20px;
border-radius:6px;
font-family:'Bebas Neue',sans-serif;
cursor:pointer;
}

</style>
</head>

<body>

<div class="enter" onclick="enterSite()">
doxx me
</div>

<div class="bg" id="bg"></div>

<div class="card">

<img src="https://i.imgur.com/hZJmi3c.jpeg" class="profile">

<div class="username">jaixen</div>

<div class="gif-row">
<img src="https://cdn.discordapp.com/emojis/1181217742850891807.gif">
<img src="https://cdn.discordapp.com/emojis/1441763213980074138.gif">
<img src="https://cdn.discordapp.com/emojis/1197092976892059658.gif">
</div>

<div class="bio">
<span id="typing"></span>
</div>

<div class="socials">
<a href="https://open.spotify.com/user/31nvw73xrjno3awszcotorzqqlre"><img src="https://i.imgur.com/P30vY7g.png"></a>
<a href="https://discordapp.com/users/1472004262749012232"><img src="https://i.imgur.com/avA16Ge.png"></a>
<a href="https://www.roblox.com/users/2955144186/profile"><img src="https://i.imgur.com/dyqAqba.png"></a>
<a href="https://instagram.com/isthismizael"><img src="https://i.imgur.com/84yV39M.png"></a>
<a href="https://www.tiktok.com/@jayzen.szn"><img src="https://i.imgur.com/iYwgHfg.png"></a>
</div>

<div class="visits">
visitors: <span id="visitCount">0</span>
</div>

</div>

<div class="cursor"></div>
<div class="cursor-follower"></div>

<audio id="bgMusic" loop>
<source src="jaixen.mp3" type="audio/mpeg">
</audio>

<div id="skidWarning">
<div class="skid-box">
<h1>WAG SKID PLZZZZZ</h1>
<p>BAWAL TANGA RITO</p>
<button onclick="closeWarning()">TANGA AKO GETS KO</button>
</div>
</div>

<script>

function enterSite(){
document.querySelector(".enter").classList.add("fade");
document.getElementById("bgMusic").play().catch(()=>{});
startTypingLoop();
}

const backgrounds=[
"https://i.imgur.com/Y2sWpkY.gif",
"https://i.imgur.com/mqyyHGC.gif",
"https://i.imgur.com/GyO3I9r.gif",
"https://i.imgur.com/7le3MDa.gif",
"https://i.imgur.com/yDLQGii.gif"
];

function setRandomBackground(){
const randomBg=backgrounds[Math.floor(Math.random()*backgrounds.length)];
document.getElementById("bg").style.backgroundImage=`url(${randomBg})`;
}

setRandomBackground();

let visits=localStorage.getItem("visits");
visits=visits?Number(visits)+1:1;
localStorage.setItem("visits",visits);
document.getElementById("visitCount").innerText=visits;

function startTypingLoop(){

const text="nag mamahal sainyo rev$hit";
const el=document.getElementById("typing");

let i=0;
let deleting=false;

function loop(){

if(!deleting){
el.textContent=text.substring(0,i++);
if(i>text.length){
deleting=true;
setTimeout(loop,1200);
return;
}
}else{
el.textContent=text.substring(0,i--);
if(i===0){
deleting=false;
}
}

setTimeout(loop,deleting?40:70);

}

loop();

}

const cursor=document.querySelector(".cursor");
const follower=document.querySelector(".cursor-follower");

let posX=0,posY=0;
let mouseX=0,mouseY=0;

document.addEventListener("mousemove",e=>{
mouseX=e.clientX;
mouseY=e.clientY;
cursor.style.left=mouseX+"px";
cursor.style.top=mouseY+"px";
});

function animate(){
posX+=(mouseX-posX)*0.15;
posY+=(mouseY-posY)*0.15;
follower.style.left=posX+"px";
follower.style.top=posY+"px";
requestAnimationFrame(animate);
}

animate();

const warning=document.getElementById("skidWarning");

function showWarning(){
warning.style.display="flex";
}

function closeWarning(){
warning.style.display="none";
}

document.addEventListener("contextmenu",function(e){
e.preventDefault();
showWarning();
});

let pressTimer;

document.addEventListener("touchstart",function(){
pressTimer=setTimeout(showWarning,600);
});

document.addEventListener("touchend",function(){
clearTimeout(pressTimer);
});

document.addEventListener("keydown",function(e){

if(e.key==="F12"){
e.preventDefault();
showWarning();
}

if(e.ctrlKey && e.shiftKey && e.key==="I"){
e.preventDefault();
showWarning();
}

if(e.ctrlKey && e.shiftKey && e.key==="J"){
e.preventDefault();
showWarning();
}

if(e.ctrlKey && e.key==="U"){
e.preventDefault();
showWarning();
}

});

</script>

</body>
</html>
